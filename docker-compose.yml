# localstack
version: '3.8'
services:
  localstack:
    image: localstack/localstack
    container_name: localstack
    ports:
      - "4566:4566"  # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services
    environment:
      - DEFAULT_REGION=us-east-1
      - DATA_DIR=/tmp/localstack/data